name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Unit tests (no secrets required) ──────────────────────────────────────
  unit:
    name: Lint, typecheck & unit tests
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x, 22.x, 24.x]

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Unit tests
        run: npm test

  # ── Integration tests (requires GITHUB_TOKEN secret) ──────────────────────
  integration:
    name: Integration tests
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    env:
      GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Set up Node.js
        uses: actions/setup-node@v4.4.0
        with:
          node-version: 24.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify token is set
        run: |
          if [ -z "$GH_TOKEN_CHECK" ]; then
            echo "❌ GH_TOKEN secret is not set or is empty — integration tests will run unauthenticated"
          else
            echo "✅ GH_TOKEN secret is present (length: ${#GH_TOKEN_CHECK})"
          fi
        env:
          GH_TOKEN_CHECK: ${{ secrets.GH_TOKEN }}

      - name: Integration tests
        run: npm run test:integration