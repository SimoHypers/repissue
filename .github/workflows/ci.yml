name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Unit tests (no secrets required) ──────────────────────────────────────
  unit:
    name: Lint, typecheck & unit tests
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x, 22.x, 24.x]

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Unit tests
        run: npm test

  # ── Integration tests (requires GITHUB_TOKEN secret) ──────────────────────
  integration:
    name: Integration tests
    runs-on: ubuntu-latest
    # secrets context is not available in job-level if conditions — use
    # github.event_name or always run and let the test handle missing auth.
    if: github.event_name == 'push' || github.event_name == 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Set up Node.js
        uses: actions/setup-node@v4.4.0
        with:
          node-version: 24.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Integration tests
        run: npx vitest run 'tests/integration/**/*.test.ts'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}